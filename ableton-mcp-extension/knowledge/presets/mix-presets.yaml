## Custom Overrides

Create a custom preset file at `{overrides}/mix-presets.yaml`:

```yaml
# Example: Custom preset for dark electronic music
genres:
  dark-electronic:
    vocals:
      noise_reduction: 0.7
      high_tame_db: -3.0
      gain_db: -0.5       # Vocals slightly back
    bass:
      highpass_cutoff: 20  # Keep all the sub
      gain_db: 2.0         # Bass way forward
    drums:
      compress_ratio: 3.0  # Tight drums
      gain_db: 1.0
```

Override files deep-merge: you only need to specify the values you want to change.

---

## Full-Mix Fallback

When stems aren't available, process the full stereo mix:

```yaml
noise_reduction: 0.3         # Lighter since affects everything
highpass_cutoff: 35Hz
click_removal: true
mud_cut_db: -2.0 @ 250Hz
presence_boost_db: +1.5 @ 3kHz
high_tame_db: -1.5 @ 7kHz
compress_ratio: 2.0
```

**Limitation**: Can't adjust stem balance or target specific elements. Always prefer stems when available.
