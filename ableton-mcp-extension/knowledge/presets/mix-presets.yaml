# Mix Presets for Ableton MCP Extension

Per-stem processing settings organized by genre family. These presets are adapted from the Claude AI Music Skills project and optimized for Ableton Live workflows.

---

## How to Use

Load presets based on your track's primary genre. Settings not specified inherit from defaults.

**Defaults** are calibrated for typical AI-generated and home studio output:
- Moderate noise reduction on vocals (0.5)
- Presence boost at 3 kHz for vocal clarity
- Mud cut around 200-300 Hz for low-mid cleanup
- Gentle compression for dynamic consistency
- Unity gain (0 dB) for each stem in the remix

**Genre presets** override specific values. For example, hip-hop boosts vocal and bass gain to push those elements forward.

---

## Default Settings (All Genres)

### Vocals (Lead)
```yaml
noise_reduction: 0.5
presence_boost_db: 2.0 @ 3kHz
high_tame_db: -2.0 @ 7kHz
compress_threshold_db: -15.0
compress_ratio: 2.5
compress_attack_ms: 10.0
gain_db: 0.0
```

### Backing Vocals
```yaml
