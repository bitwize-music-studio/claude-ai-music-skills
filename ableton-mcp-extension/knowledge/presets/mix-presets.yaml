## Common Artifacts & Fixes

### AI Hiss / Noise Floor
**Symptom**: Faint background noise, especially on vocal stems  
**Fix**: Spectral gating noise reduction  
**Default**: 0.5 strength on vocals, 0.3 on instruments  
**Override**: Reduce to 0.1-0.2 for clean stems, increase to 0.7-0.8 for noisy

### Digital Clicks / Pops
**Symptom**: Brief transient spikes from generation artifacts  
**Fix**: Click detection (amplitude spike > 6σ) + linear interpolation  
**Default**: Enabled on drums  
**Override**: Raise threshold to 8-10σ for sharp intentional transients

### Muddy Low-Mids
**Symptom**: Excess energy in 150-400 Hz range  
**Fix**: Parametric EQ cut  
**Default**: -3 dB at 200 Hz (bass), -2 dB at 300 Hz (other)  
**Override**: Reduce cut for warm genres, increase for muddy mixes

### Harsh High-Mids / Sibilance
**Symptom**: Piercing quality in 5-8 kHz range  
**Fix**: High shelf cut  
**Default**: -2 dB at 7 kHz (vocals), -1.5 dB at 8 kHz (other)  
**Override**: Reduce for warm vocals, increase for bright sources

### Sub-Bass Rumble
**Symptom**: Inaudible low-frequency content below 30 Hz  
**Fix**: Butterworth highpass filter  
**Default**: 30 Hz on bass stem  
**Override**: Lower to 20-25 Hz for sub-bass genres, raise to 40 Hz for rumble problems

