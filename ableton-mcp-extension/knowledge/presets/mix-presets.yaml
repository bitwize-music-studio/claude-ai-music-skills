presence_boost_db: 1.0 @ 3kHz
high_tame_db: -2.5 @ 7kHz
stereo_width: 1.3
compress_threshold_db: -14.0
compress_ratio: 3.0
compress_attack_ms: 8.0
gain_db: -1.5
```

