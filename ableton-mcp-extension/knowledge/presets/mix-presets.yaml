## Genre-Specific Overrides

### Hip-Hop/Rap
```yaml
# Stem Gain Adjustments
vocals_gain_db: +1.0
drums_gain_db: +0.5
bass_gain_db: +1.0
strings_gain_db: -0.5
brass_gain_db: -0.5
synth_gain_db: -0.5
percussion_gain_db: +0.5

# Vocal Processing
vocals_presence_boost_db: +2.5  # Stronger presence

# Bass Processing
bass_highpass_cutoff: 25Hz      # Keep sub-bass
bass_gain_db: +1.0              # Push bass forward

# Notes
# - Vocals pushed forward with stronger presence
# - Bass and drums emphasized for punch
# - Sub-bass preserved with lower highpass
```

### Rock/Metal
```yaml
# Stem Gain Adjustments
drums_gain_db: +0.5 to +1.0
guitar_gain_db: +0.5
synth_gain_db: -0.5

# Vocal Processing
vocals_high_tame_db: -2.5 to -3.0  # More aggressive de-essing

# Guitar Processing
guitar_saturation_drive: 0.2       # Add warmth/crunch
guitar_mud_cut_db: -3.0            # Heavier mud cut

# Drum Processing (Metal)
drums_compress_ratio: 3.0          # Tighter drums
drums_compress_attack_ms: 3.0      # Faster attack

# Other Processing
other_mud_cut_db: -3.0 to -3.5     # Clear room for guitars

# Notes
# - Aggressive high taming on vocals
# - Drums forward in the mix
# - Guitar saturation for character
# - Heavier mud cuts overall
```

### EDM/Electronic
