# Mastering Presets for Ableton MCP Extension

Genre-specific mastering chain settings optimized for streaming platforms. These presets are adapted from the Claude AI Music Skills project and calibrated for Ableton Live workflows.

---

## Universal Target

**Default**: -14 LUFS, -1.0 dBTP (True Peak)  
This works across all streaming platforms with loudness normalization.

---

## Platform Targets

| Platform | Normalization | True Peak Limit | Notes |
|----------|---------------|-----------------|-------|
| Spotify | -14 LUFS | -1.0 dBTP | Loudness normalization on by default |
| Apple Music | -16 LUFS | -1.0 dBTP | Sound Check enabled |
| YouTube | -14 LUFS | -1.0 dBTP | Integrated loudness |
| Tidal | -14 LUFS | -1.0 dBTP | HiFi tier preserves dynamics |
| Bandcamp | No normalization | -1.0 dBTP | Artist-controlled |
| SoundCloud | -8 to -13 LUFS | -1.0 dBTP | Varies by content type |
| Amazon Music | -14 LUFS | -2.0 dBTP | Stricter true peak |
| Deezer | -15 LUFS | -1.0 dBTP | Moderate normalization |

---

## Genre Presets

### Hip-Hop/Rap
```yaml
target_lufs: -10
true_peak: -1.0
compress_ratio: 2.0
compress_attack_ms: 30
compress_release_ms: 100
eq_low_shelf: +1.5 @ 100Hz      # Weight
eq_high_shelf: +1.0 @ 10kHz     # Air
saturation_drive: 0.2
stereo_width: 1.1
mono_below_hz: 120
multiband_compress: false
notes: "Competitive loudness with punchy low end"
```

