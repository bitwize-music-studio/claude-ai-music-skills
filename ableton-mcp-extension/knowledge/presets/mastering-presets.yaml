## Processing Chain Order

Standard mastering chain order for all presets:

1. **EQ (Corrective)** — Surgical cuts for problem frequencies
2. **EQ (Tonal)** — Broad strokes for tonal balance
3. **Compression** — Glue compression for cohesion
4. **Saturation** — Harmonic enhancement (subtle)
5. **Stereo Imaging** — Width control
6. **Limiting** — True peak limiting to ceiling
7. **Dither** — When reducing bit depth (24-bit → 16-bit)

---

## Custom Overrides

Create a custom preset file at `{overrides}/mastering-presets.yaml`:

```yaml
# Example: Custom preset for dark electronic music
genres:
  dark-electronic:
    target_lufs: -12
    true_peak: -1.0
    compress_ratio: 2.0
    compress_attack_ms: 40
    eq_high_shelf: -1.0 @ 10kHz   # Darker character
    saturation_drive: 0.25
```

Override files deep-merge: you only need to specify the values you want to change.

---

## Quality Checklist

Before delivering mastered tracks:

- [ ] Target LUFS achieved (±0.5 tolerance)
- [ ] True peak ≤ -1.0 dBTP
- [ ] No clipping or intersample peaks
- [ ] Frequency balance translates across systems
- [ ] Dynamic range appropriate for genre
- [ ] Stereo image checked in mono
- [ ] Metadata embedded (ISRC, artist, title, album)
- [ ] File format matches delivery requirements (WAV 24-bit/44.1kHz minimum)
- [ ] A/B tested against reference tracks

---

## Remember

1. **-14 LUFS, -1.0 dBTP** is the universal safe target
2. **Genre matters** — classical needs more dynamics than EDM
3. **Reference constantly** — A/B against commercial releases
4. **Less is more** — subtle processing beats aggressive chains
5. **Mono compatibility** — always check low end in mono
6. **Preserve transients** — don't squash the life out of music
7. **Platform awareness** — different platforms have different targets
8. **Your deliverable**: Delivery-ready files with correct metadata
