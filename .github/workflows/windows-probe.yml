# Runs the manual Windows probe on a real windows-latest runner.
#
# Deliberately `on: push` for this branch only: `workflow_dispatch` registers
# only from the repository's DEFAULT branch, so a dispatch-only workflow living
# on a feature branch cannot be triggered at all (the same trap that keeps
# nightly.yml unreachable until it reaches main).
#
# This workflow is a temporary diagnostic and is NOT intended to merge to
# develop.
name: Windows Probe (temporary)

on:
  push:
    branches: [ fix/ffmpeg-filtergraph-path-escaping ]

permissions:
  contents: read

jobs:
  probe:
    name: Windows probe (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install ffmpeg (Windows)
      if: runner.os == 'Windows'
      run: choco install ffmpeg -y --no-progress

    - name: Install ffmpeg (macOS)
      if: runner.os == 'macOS'
      run: brew install ffmpeg

    - name: Verify ffmpeg is on PATH
      shell: bash
      run: ffmpeg -version | head -1

    - name: Install runtime deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # PYTHONUTF8 is deliberately NOT set. The whole point of this probe is to
    # observe the locale-dependent behaviour that the normal `test` job masks by
    # setting it job-wide. Console codepage is left at the runner default too.
    - name: Run the probe
      run: python tests/manual/windows_probe.py

    # Re-run the decode section with the console codepage forced to Windows-1252,
    # which is what a stock non-UTF-8 desktop actually gives you. `chcp 1252`
    # alone does not change Python's preferred encoding, so drive it through
    # PYTHONLEGACYWINDOWSSTDIO + an explicit legacy codepage.
    - name: Reproduce cp1252 decode conditions (Windows only)
      if: runner.os == 'Windows'
      continue-on-error: true
      shell: cmd
      run: |
        chcp 1252
        python -X utf8=0 -c "import locale,sys; print('preferred =', locale.getpreferredencoding(False)); print('stdout =', sys.stdout.encoding)"
        python -X utf8=0 tests/manual/windows_probe.py
