# EXPERIMENTAL — throwaway capability probe, not a permanent CI gate.
#
# Answers two empirical questions the maintainer needs real evidence for,
# not guesses (see the tracking PR / FINDINGS write-up for the verdicts):
#
#   Q1. Does `claude plugin install` work in CI without any Claude auth
#       (no ANTHROPIC_API_KEY, no OAuth token, nothing)?
#   Q2. Can a windows-latest hosted runner exercise WSL well enough to run
#       this repo's test suite inside it — and which WSL version does it
#       actually get?
#
# Every job is continue-on-error: true and every command runs under
# `set +e` with explicit `echo "exit=$?"` — a hard failure IS a valid
# answer to either question, not a workflow bug to chase down. Each job
# ends with a `PROBE RESULT: ...` block echoed to the log AND appended to
# $GITHUB_STEP_SUMMARY so results are readable without log spelunking.
#
# This workflow may or may not survive past the probe phase — see the
# maintainer's call in the tracking PR.

name: Capability Probe (Experimental)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # Job A — Q1: claude plugin install, no auth
  # ---------------------------------------------------------------------
  plugin-install-probe:
    name: "Probe A: claude plugin install (no auth)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Confirm no Claude auth is present in this environment
        run: |
          set +e
          echo "ANTHROPIC_API_KEY set: ${ANTHROPIC_API_KEY:+yes}"
          echo "CLAUDE_CODE_OAUTH_TOKEN set: ${CLAUDE_CODE_OAUTH_TOKEN:+yes}"
          echo "CLAUDE_CODE_USE_BEDROCK set: ${CLAUDE_CODE_USE_BEDROCK:+yes}"
          echo "CLAUDE_CODE_USE_VERTEX set: ${CLAUDE_CODE_USE_VERTEX:+yes}"
          if [ -d "$HOME/.claude" ]; then
            echo "~/.claude already exists:"
            ls -la "$HOME/.claude"
          else
            echo "~/.claude does not exist — clean slate"
          fi

      - name: Install Claude Code CLI
        run: |
          set +e
          npm install -g @anthropic-ai/claude-code
          echo "exit=$?"

      - name: claude --version
        run: |
          set +e
          claude --version
          echo "exit=$?"

      - name: Discover plugin subcommand flags (--help)
        run: |
          set +e
          echo "### claude plugin --help"
          claude plugin --help
          echo "exit=$?"
          echo "### claude plugin marketplace --help"
          claude plugin marketplace --help
          echo "exit=$?"
          echo "### claude plugin marketplace add --help"
          claude plugin marketplace add --help
          echo "exit=$?"
          echo "### claude plugin install --help"
          claude plugin install --help
          echo "exit=$?"

      - name: Baseline — claude plugin list (before any marketplace/install attempt)
        run: |
          set +e
          claude plugin list
          echo "exit=$?"

      - name: "Documented flow step 1 — claude plugin marketplace add (README.md)"
        run: |
          set +e
          claude plugin marketplace add bitwize-music-studio/claude-ai-music-skills
          echo "exit=$?"

      - name: claude plugin marketplace list (did the add land?)
        run: |
          set +e
          claude plugin marketplace list
          echo "exit=$?"

      - name: "Documented flow step 2 — claude plugin install bitwize-music@bitwize-music (README.md)"
        run: |
          set +e
          claude plugin install bitwize-music@bitwize-music
          echo "exit=$?"

      - name: claude plugin list (after install attempt)
        run: |
          set +e
          claude plugin list
          echo "exit=$?"

      - name: Verify what actually landed on disk
        if: always()
        run: |
          set +e
          echo "### ~/.claude/plugins tree"
          find "$HOME/.claude/plugins" -maxdepth 4 2>&1
          echo "exit=$?"
          echo "### marketplace config, if any"
          find "$HOME/.claude" -iname "*marketplace*" 2>&1
          echo "### .mcp.json presence"
          find "$HOME/.claude" -iname ".mcp.json" -exec echo "found: {}" \; -exec cat {} \; 2>&1
          echo "### SKILL.md presence (sample)"
          find "$HOME/.claude/plugins" -iname "SKILL.md" 2>&1 | head -20

      - name: Summarize Probe A
        if: always()
        run: |
          set +e
          {
            echo "PROBE RESULT: plugin-install-probe"
            echo "See preceding step logs above for full exit codes and output of each"
            echo "attempted command (npm install, claude --version, --help discovery,"
            echo "plugin marketplace add, plugin marketplace list, plugin install,"
            echo "plugin list, and the on-disk verification find/cat)."
            echo "No ANTHROPIC_API_KEY / OAuth token / cloud-provider creds were set at"
            echo "any point in this job — this is the unauthenticated baseline."
          } | tee -a "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------
  # Job B1 — Q2: WSL2 on a windows-latest hosted runner
  # ---------------------------------------------------------------------
  wsl-probe-v2:
    name: "Probe B1: WSL2 on windows-latest"
    runs-on: windows-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: WSL status before setup (baseline)
        shell: bash
        run: |
          set +e
          {
            echo "### wsl.exe --status"
            wsl.exe --status
            echo "exit=$?"
            echo "### wsl.exe --list --verbose"
            wsl.exe --list --verbose
            echo "exit=$?"
            echo "### wsl.exe --version"
            wsl.exe --version
            echo "exit=$?"
          } | tee wsl-baseline-v2.txt

      - name: Set up WSL (Vampire/setup-wsl, wsl-version 2)
        id: setup_wsl
        continue-on-error: true
        uses: Vampire/setup-wsl@d1da7f2c0322a5ee4f24975344f67fc0f5baf364  # v7.0.0
        with:
          distribution: Ubuntu-22.04
          wsl-version: '2'
          use-cache: 'true'

      - name: WSL status after setup (what did we actually get?)
        if: always()
        shell: bash
        run: |
          set +e
          {
            echo "setup-wsl step outcome: ${{ steps.setup_wsl.outcome }}"
            echo "### wsl.exe --status"
            wsl.exe --status
            echo "exit=$?"
            echo "### wsl.exe --list --verbose"
            wsl.exe --list --verbose
            echo "exit=$?"
          } | tee wsl-after-setup-v2.txt

      - name: Install deps and run tests inside WSL
        id: wsl_run
        if: always()
        continue-on-error: true
        timeout-minutes: 40
        shell: wsl-bash {0}
        run: |
          set +e
          RESULT_FILE="wsl-probe-result-v2.txt"
          : > "$RESULT_FILE"
          log() { echo "$@" | tee -a "$RESULT_FILE"; }

          log "== WSL probe (target wsl-version=2, Ubuntu-22.04) =="
          log "pwd: $(pwd)"
          log "uname -a: $(uname -a)"
          log "os-release:"; cat /etc/os-release 2>&1 | tee -a "$RESULT_FILE"
          log "GITHUB_WORKSPACE forwarded: ${GITHUB_WORKSPACE:-<not set>}"
          log "ls -la:"; ls -la | tee -a "$RESULT_FILE"

          if [ ! -f requirements.txt ]; then
            log "requirements.txt NOT found in cwd — trying GITHUB_WORKSPACE"
            if [ -n "$GITHUB_WORKSPACE" ] && [ -f "$GITHUB_WORKSPACE/requirements.txt" ]; then
              cd "$GITHUB_WORKSPACE" || true
              log "cd'd to GITHUB_WORKSPACE, now: $(pwd)"
            fi
          fi

          if [ ! -f requirements.txt ]; then
            log "REPO CHECKOUT NOT VISIBLE INSIDE WSL — cannot proceed with dependency install/test run."
            log "This is itself the probe result: repo files did not carry over into the WSL session."
            exit 0
          fi

          T0=$(date +%s)
          apt-get update -qq
          log "apt-get update exit=$?"
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends python3 python3-venv python3-pip
          log "apt-get install python3/venv/pip exit=$?"
          T1=$(date +%s)
          log "apt phase wall time: $((T1 - T0))s"

          python3 -m venv /tmp/wsl-venv
          log "venv create exit=$?"
          /tmp/wsl-venv/bin/pip install --upgrade pip -q
          log "pip upgrade exit=$?"
          /tmp/wsl-venv/bin/pip --version | tee -a "$RESULT_FILE"

          T2=$(date +%s)
          timeout 1500 /tmp/wsl-venv/bin/pip install -r requirements-test.txt -r requirements.txt -q
          FULL_INSTALL_EXIT=$?
          T3=$(date +%s)
          log "full requirements install exit=$FULL_INSTALL_EXIT wall_time=$((T3 - T2))s"

          SCOPE="full"
          if [ "$FULL_INSTALL_EXIT" -ne 0 ]; then
            log "Full install failed/timed out — falling back to documented core-only scope"
            /tmp/wsl-venv/bin/pip install -q mcp pyyaml pytest
            log "core-only install exit=$?"
            SCOPE="core-only"
          fi
          log "SCOPE ACHIEVED: $SCOPE"

          T4=$(date +%s)
          if [ "$SCOPE" = "full" ]; then
            timeout 900 /tmp/wsl-venv/bin/python -m pytest tests/ --tb=short -q > pytest-output-v2.txt 2>&1
          else
            timeout 600 /tmp/wsl-venv/bin/python -m pytest tests/plugin/ tests/unit/state/ --tb=short -q > pytest-output-v2.txt 2>&1
          fi
          PYTEST_EXIT=$?
          T5=$(date +%s)
          log "pytest exit=$PYTEST_EXIT wall_time=$((T5 - T4))s scope=$SCOPE"
          log "pytest summary tail:"
          tail -25 pytest-output-v2.txt | tee -a "$RESULT_FILE"
          log "TOTAL wall time (apt+venv+install+test): $((T5 - T0))s"

      - name: Summarize Probe B1 (wsl-version 2)
        if: always()
        shell: bash
        run: |
          set +e
          {
            echo "PROBE RESULT: wsl-probe-v2 (target wsl-version=2, Ubuntu-22.04)"
            echo "setup-wsl step outcome: ${{ steps.setup_wsl.outcome }}"
            echo "in-WSL run step outcome: ${{ steps.wsl_run.outcome }}"
            echo "--- WSL status before setup ---"
            cat wsl-baseline-v2.txt 2>/dev/null || echo "(not captured)"
            echo "--- WSL status after setup ---"
            cat wsl-after-setup-v2.txt 2>/dev/null || echo "(not captured)"
            echo "--- In-WSL install/test result ---"
            cat wsl-probe-result-v2.txt 2>/dev/null || echo "(not captured — step may not have run)"
          } | tee -a "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------
  # Job B2 — Q2 fallback: WSL1 on a windows-latest hosted runner
  # ---------------------------------------------------------------------
  wsl-probe-v1-fallback:
    name: "Probe B2: WSL1 fallback on windows-latest"
    runs-on: windows-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: WSL status before setup (baseline)
        shell: bash
        run: |
          set +e
          {
            echo "### wsl.exe --status"
            wsl.exe --status
            echo "exit=$?"
            echo "### wsl.exe --list --verbose"
            wsl.exe --list --verbose
            echo "exit=$?"
          } | tee wsl-baseline-v1.txt

      - name: Set up WSL (Vampire/setup-wsl, wsl-version 1, Debian-11)
        id: setup_wsl
        continue-on-error: true
        uses: Vampire/setup-wsl@d1da7f2c0322a5ee4f24975344f67fc0f5baf364  # v7.0.0
        with:
          distribution: Debian-11
          wsl-version: '1'
          use-cache: 'true'

      - name: WSL status after setup (what did we actually get?)
        if: always()
        shell: bash
        run: |
          set +e
          {
            echo "setup-wsl step outcome: ${{ steps.setup_wsl.outcome }}"
            echo "### wsl.exe --status"
            wsl.exe --status
            echo "exit=$?"
            echo "### wsl.exe --list --verbose"
            wsl.exe --list --verbose
            echo "exit=$?"
          } | tee wsl-after-setup-v1.txt

      - name: Install deps and run tests inside WSL
        id: wsl_run
        if: always()
        continue-on-error: true
        timeout-minutes: 40
        shell: wsl-bash {0}
        run: |
          set +e
          RESULT_FILE="wsl-probe-result-v1.txt"
          : > "$RESULT_FILE"
          log() { echo "$@" | tee -a "$RESULT_FILE"; }

          log "== WSL probe (target wsl-version=1, Debian-11) =="
          log "pwd: $(pwd)"
          log "uname -a: $(uname -a)"
          log "os-release:"; cat /etc/os-release 2>&1 | tee -a "$RESULT_FILE"
          log "GITHUB_WORKSPACE forwarded: ${GITHUB_WORKSPACE:-<not set>}"
          log "ls -la:"; ls -la | tee -a "$RESULT_FILE"

          if [ ! -f requirements.txt ]; then
            log "requirements.txt NOT found in cwd — trying GITHUB_WORKSPACE"
            if [ -n "$GITHUB_WORKSPACE" ] && [ -f "$GITHUB_WORKSPACE/requirements.txt" ]; then
              cd "$GITHUB_WORKSPACE" || true
              log "cd'd to GITHUB_WORKSPACE, now: $(pwd)"
            fi
          fi

          if [ ! -f requirements.txt ]; then
            log "REPO CHECKOUT NOT VISIBLE INSIDE WSL — cannot proceed with dependency install/test run."
            log "This is itself the probe result: repo files did not carry over into the WSL session."
            exit 0
          fi

          T0=$(date +%s)
          apt-get update -qq
          log "apt-get update exit=$?"
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends python3 python3-venv python3-pip
          log "apt-get install python3/venv/pip exit=$?"
          T1=$(date +%s)
          log "apt phase wall time: $((T1 - T0))s"

          python3 -m venv /tmp/wsl-venv
          log "venv create exit=$?"
          /tmp/wsl-venv/bin/pip install --upgrade pip -q
          log "pip upgrade exit=$?"
          /tmp/wsl-venv/bin/pip --version | tee -a "$RESULT_FILE"

          # WSL1 is expected to be the slower/heavier-to-fail leg — a documented
          # core-only fallback (mcp, pyyaml, pytest) is acceptable here per the
          # probe brief if the full requirement set is too heavy/slow.
          T2=$(date +%s)
          timeout 1200 /tmp/wsl-venv/bin/pip install -r requirements-test.txt -r requirements.txt -q
          FULL_INSTALL_EXIT=$?
          T3=$(date +%s)
          log "full requirements install exit=$FULL_INSTALL_EXIT wall_time=$((T3 - T2))s"

          SCOPE="full"
          if [ "$FULL_INSTALL_EXIT" -ne 0 ]; then
            log "Full install failed/timed out — falling back to documented core-only scope"
            /tmp/wsl-venv/bin/pip install -q mcp pyyaml pytest
            log "core-only install exit=$?"
            SCOPE="core-only"
          fi
          log "SCOPE ACHIEVED: $SCOPE"

          T4=$(date +%s)
          if [ "$SCOPE" = "full" ]; then
            timeout 900 /tmp/wsl-venv/bin/python -m pytest tests/ --tb=short -q > pytest-output-v1.txt 2>&1
          else
            timeout 600 /tmp/wsl-venv/bin/python -m pytest tests/plugin/ tests/unit/state/ --tb=short -q > pytest-output-v1.txt 2>&1
          fi
          PYTEST_EXIT=$?
          T5=$(date +%s)
          log "pytest exit=$PYTEST_EXIT wall_time=$((T5 - T4))s scope=$SCOPE"
          log "pytest summary tail:"
          tail -25 pytest-output-v1.txt | tee -a "$RESULT_FILE"
          log "TOTAL wall time (apt+venv+install+test): $((T5 - T0))s"

      - name: Summarize Probe B2 (wsl-version 1 fallback)
        if: always()
        shell: bash
        run: |
          set +e
          {
            echo "PROBE RESULT: wsl-probe-v1-fallback (target wsl-version=1, Debian-11)"
            echo "setup-wsl step outcome: ${{ steps.setup_wsl.outcome }}"
            echo "in-WSL run step outcome: ${{ steps.wsl_run.outcome }}"
            echo "--- WSL status before setup ---"
            cat wsl-baseline-v1.txt 2>/dev/null || echo "(not captured)"
            echo "--- WSL status after setup ---"
            cat wsl-after-setup-v1.txt 2>/dev/null || echo "(not captured)"
            echo "--- In-WSL install/test result ---"
            cat wsl-probe-result-v1.txt 2>/dev/null || echo "(not captured — step may not have run)"
          } | tee -a "$GITHUB_STEP_SUMMARY"
