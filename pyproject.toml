[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "plugin: static plugin validation tests",
    "unit: unit tests for Python modules",
    "slow: tests that take longer than 5 seconds",
    "integration: cross-skill integration tests",
]

[tool.mypy]
python_version = "3.11"
mypy_path = "servers/bitwize-music-server"
files = ["servers/bitwize-music-server", "tools"]
namespace_packages = true
explicit_package_bases = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
ignore_missing_imports = true
no_implicit_optional = true
strict_equality = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unreachable = true
disallow_any_generics = true
follow_imports = "silent"

[tool.coverage.run]
omit = [
    "servers/bitwize-music-server/run.py",   # uvicorn entry point
    "tools/state/__main__.py",               # python -m entry point
    "tools/validate_help_completeness.py",   # standalone validation script
]

# Cross-OS `coverage combine` (see the `coverage` job in
# .github/workflows/test.yml). Each runner records ABSOLUTE paths rooted at its
# own workspace, so the same source file arrives as three different keys:
#
#   /home/runner/work/claude-ai-music-skills/claude-ai-music-skills/tools/...
#   /Users/runner/work/claude-ai-music-skills/claude-ai-music-skills/tools/...
#   D:\a\claude-ai-music-skills\claude-ai-music-skills\tools\...
#
# Without this section they stay three separate files and the "combined" total
# is silently just a concatenation — the win32/darwin lines never merge into the
# Linux picture. The first entry in each list is the canonical result; the rest
# are patterns matched against recorded paths.
#
# Two non-obvious rules, both verified empirically against coverage 7.x — get
# either wrong and the combine no-ops in silence:
#   1. `**` is required, not `*`. A single `*` does not cross path separators,
#      so `/home/runner/work/*/tools/` never matches the two-component
#      `work/<repo>/<repo>/tools/` layout GitHub checks out.
#   2. Coverage only applies a rule if the *mapped* path exists on disk, so the
#      combine step MUST run from a repo checkout.
# The workflow asserts the mapping worked rather than trusting it.
[tool.coverage.paths]
tools = [
    "tools/",
    "/home/runner/work/**/tools/",
    "/Users/runner/work/**/tools/",
    "D:\\a\\**\\tools\\",
    "C:\\a\\**\\tools\\",
]
servers = [
    "servers/",
    "/home/runner/work/**/servers/",
    "/Users/runner/work/**/servers/",
    "D:\\a\\**\\servers\\",
    "C:\\a\\**\\servers\\",
]

[tool.coverage.report]
exclude_lines = [
    "if __name__ == .__main__.",
    "def main\\(",
]

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort — import ordering
    "UP",   # pyupgrade — modern Python patterns
    "B",    # flake8-bugbear — common bug patterns
    "SIM",  # flake8-simplify — simplifiable code
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line length — handled by formatter, not linter
    "SIM108", # ternary operator — not always more readable
    "E402",   # module-level import not at top — tools/ uses sys.path before imports
]

[tool.ruff.lint.isort]
known-first-party = ["tools", "handlers"]
